server {
    listen 80;
    server_name _;

    # Limit upload size to 50 MB (matches backend enforcement for text attachments)
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text-based responses. gzip_proxied covers /api/ responses from
    # the backend (uvicorn sends them uncompressed) — important for the large
    # project-list/GeoJSON payloads.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/geo+json
        image/svg+xml;

    # Hashed Vite build assets never change under the same name — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must always be revalidated so new releases are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve index.html for all unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service.
    # The backend exposes routes at /api/v1/..., nginx forwards them unchanged.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
