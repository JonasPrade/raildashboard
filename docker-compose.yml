# docker-compose.yml – Production stack
#
# Usage:
#   docker compose up --build -d
#
# Docker Compose automatically reads .env from the working directory.
# All variable substitution (APP_VERSION, DB_USER, …) and container env vars
# come from that single file — no --env-file flag required.
#
# All services are built directly from the GitHub repository at the given release
# tag — no local source checkout required on the server. Docker clones the repo
# at build time using the GitHub URL context.
#
# Prerequisites:
#   - Copy .env.prod.example to .env and fill in the values.
#   - Set APP_VERSION in .env to the desired release tag (e.g. v1.2.0).
#   - Run the initial data migration (see docs/production_setup.md → Docker Deployment).

services:
  db:
    build:
      context: "https://github.com/JonasPrade/raildashboard.git#${APP_VERSION}:docker/db"
    restart: unless-stopped
    environment:
      POSTGRES_DB:       raildashboard
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d raildashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - raildashboard-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - raildashboard-net

  backend:
    build:
      context: "https://github.com/JonasPrade/raildashboard.git#${APP_VERSION}:apps/backend"
    restart: unless-stopped
    env_file: .env
    environment:
      # Assembled from DB_USER / DB_PASSWORD so the password only needs to be set once.
      DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/raildashboard"
      UPLOAD_DIR: /app/uploads/text-attachments
    volumes:
      - uploads:/app/uploads
    # Healthy = uvicorn responding AND a `SELECT 1` against the DB succeeded.
    # By the time /api/v1/health returns 200, alembic has finished and the app is reachable.
    # start_period gives Alembic up to 60s to run pending migrations.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - raildashboard-net

  worker:
    build:
      context: "https://github.com/JonasPrade/raildashboard.git#${APP_VERSION}:apps/backend"
    command: celery -A dashboard_backend.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/raildashboard"
      # Backend runs `alembic upgrade head`; worker must NOT race on the same migrations
      # (otherwise both containers may try the same CREATE TABLE and one crashes with
      #  psycopg2.errors.UniqueViolation on pg_class_relname_nsp_index).
      SKIP_MIGRATIONS: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      # Wait until backend reports healthy via /api/v1/health, which means alembic
      # has finished and the schema is in place before the worker imports task modules.
      backend:
        condition: service_healthy
    networks:
      - raildashboard-net

  # graphhopper: disabled — not yet required by any service.
  # Re-enable and configure GH_OSM_URL in .env when routing is needed.

  frontend:
    build:
      context: "https://github.com/JonasPrade/raildashboard.git#${APP_VERSION}:apps/frontend"
      args:
        # Empty string → API calls go to the same origin; nginx proxies /api/ → backend.
        VITE_API_BASE_URL: ""
        REACT_APP_TILE_LAYER_URL: ${REACT_APP_TILE_LAYER_URL:-}
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      - backend
    networks:
      - raildashboard-net

volumes:
  pgdata:
  uploads:    # text attachment files — back this up alongside the database!

networks:
  raildashboard-net:
