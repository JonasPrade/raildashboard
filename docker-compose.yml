# docker-compose.yml – Production stack
#
# Usage on the server:
#   docker compose pull
#   docker compose up -d
#
# Docker Compose automatically reads .env from the working directory.
# All variable substitution (IMAGE_TAG, DB_USER, …) and container env vars
# come from that single file — no --env-file flag required.
#
# BUILD and RUN are separate worlds (see docs/deploy-konventionen / production_setup.md):
#   - GitHub Actions builds immutable images and pushes them to GHCR.
#   - This file only *pulls* those images via `image: ghcr.io/.../…:${IMAGE_TAG}`.
#   - The production server never builds. Local builds live in docker-compose.override.yml.
#
# Prerequisites:
#   - Copy .env.prod.example to .env and fill in the values.
#   - Set IMAGE_TAG in .env to the release tag to run (e.g. v1.2.0).
#   - Log in to GHCR once if the packages are private:
#       docker login ghcr.io -u <github-user>
#   - Run the initial data migration (see docs/production_setup.md → Docker Deployment).

services:
  db:
    image: ghcr.io/jonasprade/raildashboard-db:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      POSTGRES_DB:       raildashboard
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d raildashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - raildashboard-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - raildashboard-net

  backend:
    image: ghcr.io/jonasprade/raildashboard-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file: .env
    environment:
      # Assembled from DB_USER / DB_PASSWORD so the password only needs to be set once.
      DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/raildashboard"
      UPLOAD_DIR: /app/uploads/text-attachments
    volumes:
      - uploads:/app/uploads
    # Healthy = uvicorn responding AND a `SELECT 1` against the DB succeeded.
    # By the time /api/v1/health returns 200, alembic has finished and the app is reachable.
    # start_period gives Alembic up to 60s to run pending migrations.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - raildashboard-net

  worker:
    image: ghcr.io/jonasprade/raildashboard-backend:${IMAGE_TAG}
    command: celery -A dashboard_backend.celery_app worker --loglevel=info
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/raildashboard"
      # Backend runs `alembic upgrade head`; worker must NOT race on the same migrations
      # (otherwise both containers may try the same CREATE TABLE and one crashes with
      #  psycopg2.errors.UniqueViolation on pg_class_relname_nsp_index).
      SKIP_MIGRATIONS: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      # Wait until backend reports healthy via /api/v1/health, which means alembic
      # has finished and the schema is in place before the worker imports task modules.
      backend:
        condition: service_healthy
    networks:
      - raildashboard-net

  graphhopper:
    image: ghcr.io/jonasprade/raildashboard-graphhopper:${IMAGE_TAG}
    restart: unless-stopped
    environment:
      # URL to an OSM PBF extract. Downloaded automatically on first start if the
      # graph cache volume is empty. Example: https://download.geofabrik.de/europe/germany-latest.osm.pbf
      GH_OSM_URL: ${GH_OSM_URL:-}
    volumes:
      # Named volume: OSM PBF + built graph cache persist across restarts.
      # No local data/ directory needed on the server.
      - ghdata:/data
    ports:
      - "8989:8989"
    networks:
      - raildashboard-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8989/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 300s   # graph build can take several minutes on first run

  frontend:
    image: ghcr.io/jonasprade/raildashboard-frontend:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "5000:80"
    depends_on:
      - backend
    networks:
      - raildashboard-net

volumes:
  pgdata:
  uploads:    # text attachment files — back this up alongside the database!
  ghdata:     # GraphHopper OSM extract + built graph cache

networks:
  raildashboard-net:
