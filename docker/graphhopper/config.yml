# GraphHopper 9.x configuration for the Schienendashboard routing microservice.
#
# This file is baked into the Docker image at build time (COPY in Dockerfile).
# It does not need to exist on the server — Docker fetches it from GitHub.
#
# Migration note: GraphHopper 9.x removed the `vehicle` property from profiles.
# The encoder is now declared via graph.flag_encoders at the top level.

graphhopper:
  datareader.file: /data/map.osm.pbf

  # ---- Encoder -----------------------------------------------------------------
  # Declare the rail encoder at the top level (replaces per-profile `vehicle` from 8.x).
  graph.flag_encoders: rail

  # ---- Profiles ----------------------------------------------------------------
  profiles:
    - name: rail_default
      weighting: fastest
      turn_costs: false

  # Contraction Hierarchies speed up queries significantly.
  profiles_ch:
    - profile: rail_default

  # ---- Storage -----------------------------------------------------------------
  graph.location: /data/graph-cache

  # ---- Server ------------------------------------------------------------------
  server:
    application_connectors:
      - type: http
        port: 8989
        bind_host: 0.0.0.0
    request_log:
      appenders: []
