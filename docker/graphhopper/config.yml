# OpenRailRouting v1.1 (GraphHopper 11.0) configuration
# https://github.com/geofabrik/OpenRailRouting

graphhopper:
  datareader.file: /data/map.osm.pbf
  graph.location: /data/graph-cache

  # Railway-specific encoded values required by the custom model files
  graph.encoded_values: gauge,voltage,electrified,frequency,road_environment,max_speed,rail_access,rail_average_speed,railway_class,railway_service,preferred_direction

  # Skip road-only highway types to reduce graph size
  import.osm.ignored_highways: footway,construction,cycleway,path,steps

  profiles:
    - name: rail_default
      turn_costs:
        vehicle_types: [train]
        u_turn_costs: 300
        enable_uturn_times: true
      custom_model_files: [rail.json]

  profiles_ch:
    - profile: rail_default

  prepare.min_network_size: 200
  prepare.subnetworks.threads: 1

  routing.snap_preventions_default: tunnel, bridge, ferry
  routing.non_ch.max_waypoint_distance: 1000000

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
  request_log:
    appenders: []
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 0.0.0.0

logging:
  level: INFO
  appenders:
    - type: console
      time_zone: UTC
      log_format: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
